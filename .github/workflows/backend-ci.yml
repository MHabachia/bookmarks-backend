name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Code auschecken
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Java 21 einrichten
      - name: Java 21 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Gradle Wrapper ausführbar machen
      - name: Gradle Wrapper berechtigen
        run: chmod +x gradlew

      # 4. Projekt bauen (ohne Tests — kein DB verfügbar in CI)
      - name: Projekt bauen
        run: ./gradlew bootJar -x test --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          AUTH0_ISSUER_URI: https://placeholder.auth0.com/
          FRONTEND_URL: http://localhost:5173
