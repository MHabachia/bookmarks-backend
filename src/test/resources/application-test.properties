# Test-Konfiguration
spring.main.allow-bean-definition-overriding=true

# Flyway explizit aktivieren und Migrationen aus dem richtigen Pfad laden
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA — Tabellen nicht neu erstellen, Flyway macht das
spring.jpa.hibernate.ddl-auto=none

# Platzhalter für SecurityConfig (wird nicht geladen wegen @Profile("!test"))
auth0.issuer-uri=https://placeholder.auth0.com/
frontend.url=http://localhost:5173
