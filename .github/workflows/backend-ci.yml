name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    # Docker ist auf ubuntu-latest verfügbar — Testcontainers startet
    # PostgreSQL automatisch aus dem Test-Code heraus

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Java 21 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle Wrapper berechtigen
        run: chmod +x gradlew


      # Unit-Tests (Mockito) + Integrationstests (echte DB) laufen zusammen
      - name: Tests ausführen
        run: ./gradlew test --no-daemon
        env:
          # Fallback-Werte — Testcontainers überschreibt diese automatisch
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test
          SPRING_DATASOURCE_USERNAME: ${{ secrets.TEST_DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          AUTH0_ISSUER_URI: ${{ secrets.AUTH0_ISSUER_URI }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

      - name: Production Build erstellen
        run: ./gradlew bootJar -x test --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test
          SPRING_DATASOURCE_USERNAME: ${{ secrets.TEST_DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          AUTH0_ISSUER_URI: ${{ secrets.AUTH0_ISSUER_URI }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
