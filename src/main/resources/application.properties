spring.application.name=bookmark-backend
server.port=8080

# PostgreSQL Verbindung
spring.datasource.url=jdbc:postgresql://localhost:5432/bookmarkit
spring.datasource.username=bookmarkit
spring.datasource.password=BookMark!t2026!
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway DB Migration, für Auth Erweiterung später
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration