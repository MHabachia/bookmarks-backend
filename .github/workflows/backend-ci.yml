name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ secrets.TEST_DB_NAME }}
          POSTGRES_USER: ${{ secrets.TEST_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        ports:
          - 5432:5432
        # -U gibt den korrekten User an — ohne das versucht pg_isready
        # sich als "root" (GitHub Actions Runner User) zu verbinden
        options: >-
          --health-cmd "pg_isready -U ${{ secrets.TEST_DB_USER }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Java 21 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle Wrapper berechtigen
        run: chmod +x gradlew

      - name: JUnit Tests ausführen
        run: ./gradlew test --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ secrets.TEST_DB_NAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.TEST_DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          AUTH0_ISSUER_URI: ${{ secrets.AUTH0_ISSUER_URI }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

      - name: Production Build erstellen
        run: ./gradlew bootJar -x test --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ secrets.TEST_DB_NAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.TEST_DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          AUTH0_ISSUER_URI: ${{ secrets.AUTH0_ISSUER_URI }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
