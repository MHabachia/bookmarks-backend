# Test-Konfiguration — überschreibt application.properties für alle Tests

# JWT Decoder deaktivieren — kein echter Auth0-Aufruf in Tests
# Der JwtDecoder wird durch einen Mock ersetzt (siehe TestSecurityConfig)
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
