spring.application.name=bookmark-backend
server.port=8080

# PostgreSQL Verbindung — Fallback für lokale Entwicklung
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookmarkit}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway DB Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Auth0
auth0.issuer-uri=${AUTH0_ISSUER_URI:http://localhost/}

# Frontend URL für CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}
