spring.application.name=bookmark-backend
server.port=8080

# PostgreSQL Verbindung
spring.datasource.url=jdbc:postgresql://localhost:5432/bookmarkit
spring.datasource.username=bookmarkit
spring.datasource.password=DEIN_SICHERES_PASSWORT
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway DB Migration, für Auth Erweiterung später
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration